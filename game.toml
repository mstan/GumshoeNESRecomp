# game.toml — Gumshoe (NES, Mapper 66 / GxROM, 128KB PRG, 32KB CHR ROM)

[game]
output_prefix = "gumshoe"

# Inline dispatch: pops return address to find an inline 2-byte LE address
# table. Index is in A (pre-shifted by ASL). Each 32KB window has its own
# dispatch routine at a different address.
[[inline_dispatch]]
addr = 0xD476
[[inline_dispatch]]
addr = 0xC768
[[inline_dispatch]]
addr = 0xD6AD
[[inline_dispatch]]
addr = 0xA89D

# Merge: main game loop at $8000 and its continuation at $8024 must share
# a single function body. Without this, BNE $8000 at $8026 in func_8024
# becomes a recursive call_by_address() instead of a goto, causing stack overflow.
[[merge_func]]
bank = -1
addr_lo = 0x8000
addr_hi = 0x8024

# Similarly merge $8087 and $80A2 — JMP $80A2 within $8087 should be goto.
[[merge_func]]
bank = -1
addr_lo = 0x8087
addr_hi = 0x80A2

# --- title/menu auto-advance: FIXED (see GUMSHOE_MENU_AUTOADVANCE.md) ---
# Root cause was a $4017 Zapper trigger-bit polarity bug in runner/runtime.c
# (idle reported a phantom press -> func_98D2 set $C5 -> func_808C cleared the
# mode selector $24 -> dropped into the $25 title state machine). Fixed in the
# runner (active-high trigger bit), commit 6325b8c. NOT recompiler
# fragmentation/recursion (that theory was disproven); no game.toml seed needed.

[functions]
# Functions discovered via dispatch_misses.log at runtime
bank0 = [
    0x9BBF,
]
bank2 = [
    0x9DEA,
]
bank6 = [
    0x80BF,
]
